services:
  bot:
    image: ghcr.io/zakkaus/verificationbot:latest
    # Or build locally:
    # build: .
    restart: unless-stopped
    env_file: .env
    volumes:
      - botdata:/data
    environment:
      DB_PATH: /data/bot.db
    # Expose only to localhost — cloudflared handles external access
    ports:
      - "127.0.0.1:8080:8080"   # Admin dashboard (tunneled via cloudflared)
      - "127.0.0.1:8443:8443"   # Telegram webhook (needs Nginx or cloudflared)
    healthcheck:
      test: ["CMD", "/bot", "--help"]
      interval: 30s
      timeout: 5s
      retries: 3

  # Cloudflare Tunnel — gives the admin dashboard a public HTTPS URL
  # without opening any firewall ports at all.
  #
  # Setup:
  #   1. cloudflared tunnel login              # authenticate via browser
  #   2. cloudflared tunnel create verificationbot
  #   3. copy the tunnel token from output into TUNNEL_TOKEN below
  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${TUNNEL_TOKEN}
    environment:
      TUNNEL_TOKEN: ${TUNNEL_TOKEN}   # set in .env

  # Optional: Nginx for Telegram webhook (if not using Cloudflare Tunnel for webhook)
  # nginx:
  #   image: nginx:alpine
  #   restart: unless-stopped
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
  #     - certbot-certs:/etc/letsencrypt:ro
  #   depends_on:
  #     - bot

volumes:
  botdata:
