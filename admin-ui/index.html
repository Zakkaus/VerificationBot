<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Admin Panel</title>
<link rel="stylesheet" href="/admin/assets/style.css">
</head>
<body>
<div id="sidebar">
  <div class="brand">
    <img id="brand-logo" src="" alt="" style="display:none;width:28px;height:28px;border-radius:6px;object-fit:cover">
    <span id="brand-name">Admin</span>
  </div>
  <nav>
    <a href="#" class="nav-item active" data-page="dashboard">
      <span class="nav-icon">📊</span><span class="nav-label">儀表板</span>
    </a>
    <a href="#" class="nav-item" data-page="logs">
      <span class="nav-icon">📋</span><span class="nav-label">操作記錄</span>
    </a>
    <a href="#" class="nav-item" data-page="settings">
      <span class="nav-icon">⚙️</span><span class="nav-label">設定</span>
    </a>
    <a href="#" class="nav-item superadmin-only" data-page="users" style="display:none">
      <span class="nav-icon">👥</span><span class="nav-label">帳號管理</span>
    </a>
  </nav>
  <div class="sidebar-footer">
    <span id="user-badge"></span>
    <button class="logout-btn" onclick="logout()">登出</button>
  </div>
</div>

<div id="main">
  <div id="content">
    <div class="spinner">載入中…</div>
  </div>
</div>

<script src="/admin/assets/app.js"></script>
</body>
</html>
