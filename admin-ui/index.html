<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Admin — VerificationBot</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="/admin/assets/style.css"/>
</head>
<body>
<div class="layout">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="sidebar-logo-placeholder" id="sb-logo">🤖</div>
      <span class="sidebar-name" id="sb-name">Admin Panel</span>
    </div>
    <nav class="nav" id="nav">
      <a class="nav-item" href="#dashboard" data-page="dashboard"><span class="icon">📊</span>儀表板</a>
      <a class="nav-item" href="#logs" data-page="logs"><span class="icon">📋</span>操作記錄</a>
      <a class="nav-item" href="#settings" data-page="settings"><span class="icon">⚙️</span>外觀設定</a>
      <a class="nav-item superadmin-only" href="#users" data-page="users" style="display:none"><span class="icon">👥</span>帳號管理</a>
    </nav>
    <div class="sidebar-bottom">
      <div class="user-chip">
        <span>👤</span>
        <span id="sb-user" style="font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"></span>
        <span class="user-role" id="sb-role"></span>
      </div>
      <button class="btn btn-outline btn-sm" style="width:100%;margin-top:8px" onclick="logout()">登出</button>
    </div>
  </aside>

  <!-- Main -->
  <div class="main">
    <div class="topbar">
      <span class="topbar-title" id="page-title">儀表板</span>
    </div>
    <div class="content" id="content">
      <div class="empty">載入中…</div>
    </div>
  </div>
</div>

<script src="/admin/assets/app.js"></script>
</body>
</html>
