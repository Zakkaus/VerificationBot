server {
    listen 80;
    server_name your-domain.com;
    # Redirect HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name your-domain.com;

    # SSL — managed by Certbot
    ssl_certificate     /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # --- Telegram Webhook (port 443 forwarded to bot's internal port 8443) ---
    location /webhook {
        proxy_pass         http://127.0.0.1:8443;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 30s;
    }

    # --- Mini App (served directly by the Go bot) ---
    location /webapp/ {
        proxy_pass         http://127.0.0.1:8080/webapp/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        add_header         Cache-Control "public, max-age=3600";
    }

    # --- Admin Dashboard (internal only — NOT exposed to the internet!) ---
    # Uncomment below ONLY if you want the admin panel on the same domain.
    # Otherwise, access via SSH tunnel: ssh -L 8080:localhost:8080 user@server
    #
    # location /admin/ {
    #     proxy_pass       http://127.0.0.1:8080/admin/;
    #     # Restrict to your IP only:
    #     allow  YOUR.IP.ADDRESS.HERE;
    #     deny   all;
    #     proxy_http_version 1.1;
    #     proxy_set_header Host $host;
    # }
}
